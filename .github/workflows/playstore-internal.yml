name: Play Store Internal Release

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: play-store-internal-${{ github.ref }}
  cancel-in-progress: false

jobs:
  internal-release:
    name: Build, sign, and upload internal release
    runs-on: ubuntu-latest
    env:
      ANDROID_PACKAGE_NAME: com.ibsam.trash_tornado
      PLAY_TRACK: ${{ vars.PLAY_TRACK || 'internal' }}
      PLAY_RELEASE_STATUS: ${{ vars.PLAY_RELEASE_STATUS || 'completed' }}
      PLAY_PRIVACY_URL: ${{ vars.PLAY_PRIVACY_URL }}
      PLAY_UPLOAD_LISTING_ASSETS: ${{ vars.PLAY_UPLOAD_LISTING_ASSETS || 'false' }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Check release secrets
        id: release_secrets
        run: |
          missing=()
          test -n "$ANDROID_KEYSTORE_BASE64" || missing+=("ANDROID_KEYSTORE_BASE64")
          test -n "$ANDROID_KEYSTORE_PASSWORD" || missing+=("ANDROID_KEYSTORE_PASSWORD")
          test -n "$ANDROID_KEY_PASSWORD" || missing+=("ANDROID_KEY_PASSWORD")
          test -n "$ANDROID_KEY_ALIAS" || missing+=("ANDROID_KEY_ALIAS")
          if [ -z "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" ] && [ -z "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_B64" ]; then
            missing+=("GOOGLE_PLAY_SERVICE_ACCOUNT_JSON or GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_B64")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            printf 'Missing Play upload secrets: %s\n' "${missing[*]}"
            echo "::notice title=Play upload skipped::Add the Play upload secrets to enable automatic internal-track deployment."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore Android upload key
        if: steps.release_secrets.outputs.ready == 'true'
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Restore Google Play service account
        if: steps.release_secrets.outputs.ready == 'true'
        run: |
          mkdir -p fastlane/secrets
          if [ -n "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_B64" ]; then
            printf "%s" "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_B64" | base64 --decode > fastlane/secrets/play-service-account.json
          else
            printf "%s" "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" > fastlane/secrets/play-service-account.json
          fi
          python -m json.tool fastlane/secrets/play-service-account.json > /dev/null
          echo "GOOGLE_PLAY_JSON_KEY_FILE=fastlane/secrets/play-service-account.json" >> "$GITHUB_ENV"

      - name: Apply Play Store privacy URL
        if: env.PLAY_PRIVACY_URL != ''
        run: printf "%s\n" "$PLAY_PRIVACY_URL" > fastlane/metadata/android/en-US/privacy_url.txt

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build app bundle
        run: flutter build appbundle --release --build-number ${{ github.run_number }}

      - name: Upload to Play Store internal track
        if: steps.release_secrets.outputs.ready == 'true'
        run: bundle exec fastlane android internal
